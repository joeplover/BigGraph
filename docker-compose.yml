# =============================================================================
# BigGraph Docker 编排 — 全量部署
#
# 所有数据持久化到项目根目录 docker-data/ 下统一管理
#
# 启动:
#   docker compose up -d
#
# 环境变量（自动从 .env 文件读取）:
#   LLM_API_KEY    — LLM API 密钥
#   LLM_BASE_URL   — LLM API 地址
# =============================================================================

services:
  # ================================================================
  # PostgreSQL — 元数据与持久化层
  # ================================================================
  postgres:
    image: postgres:16-alpine
    container_name: biggraph-postgres
    environment:
      POSTGRES_USER: workface
      POSTGRES_PASSWORD: 678678
      POSTGRES_DB: workface
      TZ: Asia/Shanghai
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workface"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ================================================================
  # Redis — 缓存 / 会话 / PPT 状态
  # ================================================================
  redis:
    image: redis:7-alpine
    container_name: biggraph-redis
    ports:
      - "6379:6379"
    volumes:
      - ./docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ================================================================
  # Qdrant — 向量数据库
  # ================================================================
  qdrant:
    image: qdrant/qdrant:v1.12.6
    container_name: biggraph-qdrant
    volumes:
      - ./docker-data/qdrant:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "apt-get update -qq && apt-get install -y -qq curl && curl -s -o /dev/null http://localhost:6333/healthz"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ================================================================
  # Elasticsearch — 全文检索引擎
  # ================================================================
  elasticsearch:
    image: elasticsearch:8.17.1
    container_name: biggraph-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - ingest.geoip.downloader.enabled=false
    volumes:
      - ./docker-data/elasticsearch:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ================================================================
  # Embedding — LLama.cpp + bge-m3 向量化服务
  # ================================================================
  embedding:
    build:
      context: .
      dockerfile: docker/embedding/Dockerfile
    container_name: biggraph-embedding
    ports:
      - "1233:1233"
    volumes:
      - ./emb/bge-m3-Q4_K_M.gguf:/model/bge-m3-Q4_K_M.gguf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:1233/v1/embeddings -H 'Content-Type: application/json' -d '{\"input\":\"hi\",\"model\":\"bge-m3\"}' | grep -q 200",
        ]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ================================================================
  # Backend — FastAPI 后端
  # ================================================================
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: biggraph-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      embedding:
        condition: service_healthy
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: workface
      PG_PASSWORD: 678678
      PG_DATABASE: workface
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: enterprise_knowledge_chunks
      QDRANT_VECTOR_SIZE: "1024"
      ES_HOSTS: http://elasticsearch:9200
      ES_USER: elastic
      ES_PASSWORD: changeme
      EMBEDDING_BASE_URL: http://embedding:1233/v1
      EMBEDDING_MODEL: bge-m3
      EMBEDDING_API_KEY: ""
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL:-DeepSeek-V4-Flash[free]}
      LOG_LEVEL: INFO
      LOG_DIR: /app/logs
      TZ: Asia/Shanghai
    ports:
      - "8000:8000"
    volumes:
      - ./docker-data/uploads:/app/uploads
      - ./docker-data/logs:/app/logs
    restart: unless-stopped

  # ================================================================
  # Frontend — Vue3 Nginx
  # ================================================================
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: biggraph-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped